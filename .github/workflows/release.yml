name: Release — Matrix Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Job 1: Suite unitaria completa antes de buildear ─────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  # ── Job 2: Build multiplataforma (depende de test) ────────────────────────
  build:
    name: Build — ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            runner: windows-latest
            artifact: '*.exe'
          - os: macOS
            runner: macos-latest
            artifact: '*.dmg'
          - os: Linux
            runner: ubuntu-latest
            artifact: '*.AppImage'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite (renderer)
        run: npm run build

      # macOS: configurar firma y notarización Apple (solo si el secret está configurado)
      - name: Import macOS code signing certificate
        if: matrix.os == 'macOS' && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # Windows: firma con signtool (certificado en secrets)
      - name: Setup Windows code signing
        if: matrix.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          echo "$env:WINDOWS_CERTIFICATE" | Out-File -FilePath certificate.b64
          certutil -decode certificate.b64 certificate.p12
        shell: pwsh

      - name: Build Electron installers
        env:
          # macOS notarización (opcionales — solo si los secrets están configurados)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows firma (opcional)
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
          # Canal de auto-updater
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:electron

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist-electron/release/${{ matrix.artifact }}
          retention-days: 7

  # ── Job 3: Crear GitHub Release con los instaladores ─────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers/

      - name: Generate SHA-256 checksums
        run: |
          cd installers
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) \
            | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*
            installers/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: E2E con subprocesos reales (corre en paralelo con release) ─────
  e2e:
    name: E2E Tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      # Los binarios de RuVector/Whisper/Docling se instalarían aquí
      # cuando estén disponibles como GitHub Actions artifacts o packages
      - name: Run E2E tests (grounding + fixtures)
        run: E2E=false npx vitest run src/cortex/e2e/
        # E2E=false hasta que los binarios estén instalados en este runner

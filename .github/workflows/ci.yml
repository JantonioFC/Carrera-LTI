name: CI

on:
  push:
    branches: [ "main", "cortex/develop", "cortex/**" ]
  pull_request:
    branches: [ "main", "cortex/develop" ]

permissions:
  contents: read  # mínimo global; evita GITHUB_TOKEN con write por defecto (#178)

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            node-version: 22.x
            run-gitleaks: true

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0  # Requerido por gitleaks para escanear el historial completo

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Dependency vulnerability audit (#248)
      # --audit-level=high: las vulnerabilidades moderate actuales (brace-expansion
      # GHSA-f886-m6hf-6m8v) están en electron-builder y google-auth-library —
      # herramientas de build y cliente HTTP que no procesan input arbitrario del
      # usuario en este contexto. Fix requiere breaking changes (electron-builder).
      run: npm audit --audit-level=high

    - name: Secret scanning (gitleaks)
      if: matrix.run-gitleaks == true
      uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Formatting & Lint (Biome)
      run: npm run lint

    - name: Enforce electron/src boundary (#246)
      if: runner.os != 'Windows'
      run: |
        if grep -rE --include="*.ts" "from [\"'](\.\./)*src/" electron/; then
          echo "VIOLATION: electron/ must not import runtime values from src/ (see CONTRIBUTING.md)"
          exit 1
        fi

    - name: Run tests
      run: npm run test

    - name: Coverage with threshold validation
      if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
      run: npm run test:coverage
      # Falla si lines/functions/branches/statements < thresholds en vite.config.ts

    - name: Cache Python venv
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.carrera-lti/venv
        key: python-venv-${{ runner.os }}-${{ hashFiles('scripts/requirements*.txt', 'scripts/setup.py', 'scripts/*.py') }}
        restore-keys: |
          python-venv-${{ runner.os }}-

    - name: Python syntax check (Fase D runners)
      run: python3 -m py_compile scripts/docling_runner.py scripts/whisper_runner.py scripts/observer_runner.py

    - name: Typecheck and Build
      run: npm run build

  e2e:
    name: E2E Tests (grounding + fixtures)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 20.x
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Run E2E tests (grounding + fixtures, sin binarios)
      run: E2E=false npx vitest run src/cortex/e2e/
      # E2E=false → los tests de subprocesos reales se saltean (describe.skipIf),
      # pero los tests de GroundingValidator y fixtures siempre corren.

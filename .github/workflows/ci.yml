name: CI

on:
  push:
    branches: [ "main", "cortex/develop", "cortex/**" ]
  pull_request:
    branches: [ "main", "cortex/develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # Use current active LTS

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Secret scanning (gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Formatting & Lint (Biome)
      run: npm run lint
      
    - name: Run tests
      run: npm run test

    - name: Python syntax check (Fase D runners)
      run: python3 -m py_compile scripts/docling_runner.py scripts/whisper_runner.py scripts/observer_runner.py

    - name: Typecheck and Build
      run: npm run build

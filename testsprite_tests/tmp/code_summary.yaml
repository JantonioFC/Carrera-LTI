version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - TailwindCSS
  - Dnd-kit
  - Zustand
  - Firebase
  - Dexie (IndexedDB)
routes:
  - path: /
    file: src/pages/Dashboard.tsx
    auth_required: false
    description: Main dashboard with widgets
  - path: /materias
    file: src/pages/Materias.tsx
    auth_required: false
    description: List of subjects and their status
  - path: /calendario
    file: src/pages/Calendario.tsx
    auth_required: false
    description: Academic calendar
  - path: /malla
    file: src/pages/MallaCurricular.tsx
    auth_required: false
    description: Visual curriculum map
  - path: /tareas
    file: src/pages/Tareas.tsx
    auth_required: false
    description: Task management page
  - path: /examenes
    file: src/pages/Examenes.tsx
    auth_required: false
    description: Exam schedule and planning
  - path: /horarios
    file: src/pages/Horarios.tsx
    auth_required: false
    description: Visual schedule generator (Drag and Drop)
  - path: /aether
    file: src/pages/AetherVault.tsx
    auth_required: false
    description: File vault
  - path: /aether/canvas
    file: src/pages/AetherCanvas.tsx
    auth_required: false
    description: Interactive canvas for notes
  - path: /aether/chat
    file: src/pages/AetherChat.tsx
    auth_required: false
    description: AI Assistant Chat
  - path: /nexus
    file: src/pages/NexusWorkspace.tsx
    auth_required: false
    description: Collaborative workspace
  - path: /nexus/db
    file: src/pages/NexusDatabase.tsx
    auth_required: false
    description: Database view
  - path: /nexus/ai
    file: src/pages/NexusAI.tsx
    auth_required: false
    description: AI features hub
features:
  - name: Schedule Generator
    description: Drag and drop subjects to create a weekly schedule
    files:
      - src/pages/Horarios.tsx
    entry_route: /horarios
    user_interactions:
      - Drag subject from bank to a weekday
      - Reorder subjects within a weekday
      - Drag subject back to bank to remove from day
      - Edit subject time by clicking on clock icon
    api_calls: []
    auth_required: false
  - name: Subject Management
    description: Track status and grades for subjects
    files:
      - src/pages/Materias.tsx
      - src/hooks/useSubjectData.tsx
    entry_route: /materias
    user_interactions:
      - Filter subjects by status or semester
      - Toggle subject status (pendiente, en curso, aprobada)
      - Edit subject grades
    api_calls: []
    auth_required: false
  - name: Task Management
    description: Create and manage academic tasks
    files:
      - src/pages/Tareas.tsx
    entry_route: /tareas
    user_interactions:
      - Create new task with title and due date
      - Mark task as completed
      - Delete a task
    api_calls: []
    auth_required: false
known_limitations: []
